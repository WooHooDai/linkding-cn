{% load i18n %}
<section id="tag-section-container" aria-labelledby="tags-heading" ld-collapse-button="" data-toggle-storage-key="tagSectionState" data-toggle-target-selector=".section-content">
  <div class="section-header no-wrap">
    <div class="section-title">
      <h2 id="tags-heading">{% translate "Tags" %}</h2>
      {% if user.is_authenticated %}
        {% include "bookmarks/collapsed_button.html" with toggle_class="section-toggle" %}
        <ld-dropdown class="dropdown dropdown-right ml-auto">
          <button class="btn btn-noborder dropdown-toggle" aria-label="{% translate 'Tags menu' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M4 6l16 0"/>
              <path d="M4 12l16 0"/>
              <path d="M4 18l16 0"/>
            </svg>
          </button>
          <ul class="menu" role="list" tabindex="-1">
            <li class="menu-item">
              <a href="{% url 'linkding:tags.index' %}" class="menu-link">{% translate "Manage tags" %}</a>
            </li>
            <li class="menu-item">
              <form method="post">
                {% csrf_token %}
                <input type="hidden" name="pref_action" value="toggle_tag_grouping">
                <input type="hidden" name="value" value="{{ tag_cloud.toggle_tag_grouping_value }}">
                <button type="submit" class="menu-link">{{ tag_cloud.toggle_tag_grouping_label }}</button>
              </form>
            </li>
          </ul>
        </ld-dropdown>
      {% endif %}
    </div>
  </div>
  <div id="tag-cloud-container" class="section-content">
    {% include 'bookmarks/tag_cloud.html' %}
  </div>
</section>
