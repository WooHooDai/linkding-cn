{% load i18n static %}
<section id="domain-section-container" aria-labelledby="domains-heading" ld-collapse-button data-toggle-storage-key="domainSectionState" data-toggle-target-selector=".section-content">
  <div class="section-header no-wrap">
    <div class="section-title">
      <h2 id="domains-heading">{% translate "Domains" %}</h2>
      {% include "bookmarks/collapsed_button.html" with toggle_class="section-toggle" %}
      <ld-dropdown class="dropdown dropdown-right ml-auto">
        <button class="btn btn-noborder dropdown-toggle" aria-label="{% translate 'Domains menu' %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M4 6l16 0"/>
            <path d="M4 12l16 0"/>
            <path d="M4 18l16 0"/>
          </svg>
        </button>
        <ul class="menu" role="list" tabindex="-1">
          <li class="menu-item">
            <a href="{{ domains.menu_url }}" class="menu-link" data-domain-target-view-mode="{{ domains.toggle_view_mode_target }}" onclick="return window.ldHandleDomainPreferenceClick ? window.ldHandleDomainPreferenceClick(event) : true">{{ domains.toggle_view_mode_label }}</a>
          </li>
          <li class="menu-item">
            <a href="{{ domains.menu_url }}" class="menu-link" data-domain-target-compact-mode="{{ domains.toggle_compact_mode_target }}" onclick="return window.ldHandleDomainPreferenceClick ? window.ldHandleDomainPreferenceClick(event) : true">{{ domains.toggle_compact_mode_label }}</a>
          </li>
        </ul>
      </ld-dropdown>
    </div>
  </div>
  <div id="domain-tree-container" class="section-content">
    {% include "bookmarks/domain_tree.html" %}
  </div>
</section>
