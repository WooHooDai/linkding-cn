{% load i18n shared %}

<ld-form data-submit-on-change>
  <form id="user-select" action="" method="get">
    {% for hidden_field in form.hidden_fields %}
      {{ hidden_field }}
    {% endfor %}
    <div class="form-group">
      <div class="d-flex">
        {% formfield form.user class="form-select" data_submit_on_change="" %}
        <noscript>
          <button type="submit" class="btn btn-link ml-2">{% translate "Apply" %}</button>
        </noscript>
      </div>
    </div>
  </form>
</ld-form>
