{% load i18n %}
<turbo-frame id="tag-modal">
  <form method="post"
        action="{% url 'linkding:tags.edit' tag.id %}?{{ request.GET.urlencode }}"
        data-turbo-frame="tag-main"
        novalidate>
    {% csrf_token %}
    <ld-modal class="modal tag-edit-modal active"
              data-close-url="{% url 'linkding:tags.index' %}?{{ request.GET.urlencode }}"
              data-turbo-frame="tag-modal">
      <div class="modal-overlay" data-close-modal></div>
      <div class="modal-container" role="dialog" aria-modal="true">
        <div class="modal-header">
          <h2 class="title">{% translate "Edit tag" %}</h2>
          <button type="button" class="btn btn-noborder close" aria-label="{% translate 'Close dialog' %}"
                  data-close-modal>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2"
                 stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <path d="M18 6l-12 12"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          {% include 'tags/form.html' %}
        </div>
        <div class="modal-footer d-flex justify-between">
          <button type="button" class="btn btn-wide" data-close-modal>{% translate "Cancel" %}</button>
          <button type="submit" class="btn btn-primary btn-wide">{% translate "Save" %}</button>
        </div>
      </div>
    </ld-modal>
  </form>
</turbo-frame>
